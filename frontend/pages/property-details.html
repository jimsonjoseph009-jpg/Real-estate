<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Details - Real Estate System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/property-details.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-building"></i>
                <span>RealEstateHub</span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="../index.html#properties" class="nav-link">Properties</a></li>
            </ul>
        </div>
    </nav>

    <!-- Property Details -->
    <div class="property-details-container">
        <div class="container">
            <!-- Image Gallery -->
            <div class="property-gallery">
                <div class="main-image">
                    <img id="mainImage" src="" alt="Property">
                </div>
                <div class="thumbnail-images" id="thumbnailImages"></div>
            </div>

            <!-- Property Info -->
            <div class="property-info">
                <h1 id="propertyTitle"></h1>
                <div class="property-meta">
                    <span class="price" id="propertyPrice"></span>
                    <span class="category" id="propertyCategory"></span>
                    <span class="status" id="propertyStatus"></span>
                </div>

                <div class="property-details">
                    <div class="detail-item">
                        <i class="fas fa-bed"></i>
                        <span id="bedrooms">-</span> Bedrooms
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-bath"></i>
                        <span id="bathrooms">-</span> Bathrooms
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-ruler-combined"></i>
                        <span id="area">-</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-car"></i>
                        <span id="parking">-</span> Parking
                    </div>
                </div>

                <!-- Description -->
                <div class="property-description">
                    <h3>Description</h3>
                    <p id="description"></p>
                </div>

                <!-- Amenities -->
                <div class="amenities">
                    <h3>Amenities</h3>
                    <div id="amenitiesList" class="amenities-list"></div>
                </div>

                <!-- Location -->
                <div class="location">
                    <h3>Location</h3>
                    <p id="location"></p>
                    <div id="map" class="map"></div>
                </div>

                <!-- Agent Info -->
                <div class="agent-card">
                    <h3>Contact Agent</h3>
                    <div class="agent-info">
                        <div>
                            <p class="agent-name" id="agentName"></p>
                            <p class="agent-contact" id="agentContact"></p>
                        </div>
                    </div>
                    <button onclick="openInquiryModal()" class="btn btn-primary btn-block">Make an Inquiry</button>
                </div>

                <!-- Reviews -->
                <div class="reviews-section">
                    <h3>Reviews</h3>
                    <div id="reviewsList" class="reviews-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Inquiry Modal -->
    <div id="inquiryModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeInquiryModal()">&times;</span>
            <h2>Request Property Viewing</h2>
            <form id="inquiryForm" onsubmit="submitInquiry(event)">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="inquiryName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="inquiryEmail" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="inquiryPhone">
                </div>
                <div class="form-group">
                    <label>Inquiry Type</label>
                    <select id="inquiryType" required>
                        <option value="viewing">Request Viewing</option>
                        <option value="information">Request Information</option>
                        <option value="offer">Make an Offer</option>
                        <option value="general">General Inquiry</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="inquiryMessage" rows="4"></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Submit Inquiry</button>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/property-details.js"></script>
</body>
</html>
